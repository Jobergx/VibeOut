<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeOut | Social Deduction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background-color: #0f172a; color: white; }
        .hidden-screen { display: none; }
        .screen-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="debug-log" class="fixed top-0 left-0 w-full bg-red-900/80 text-[10px] p-1 z-[100] font-mono text-center border-b border-red-700 text-white">
        DATABASE STATUS: DISCONNECTED (Check Rules/Internet)
    </div>

    <header id="game-header" class="hidden p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center mt-6">
        <div id="scoreboard-list" class="flex gap-2 overflow-x-auto"></div>
        <div class="text-[10px] font-bold text-slate-500 uppercase">VibeOut</div>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-center">
        <section id="screen-lobby" class="screen-fade w-full max-w-md text-center">
            <h1 class="text-6xl font-bold mb-2 italic"><span class="text-[#3b82f6]">Vibe</span>Out</h1>
            <div id="entry-form" class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700 mb-6">
                <input id="player-name" type="text" placeholder="YOUR NAME" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-center font-bold mb-3 outline-none">
                <input id="room-input" type="text" placeholder="ROOM CODE (BLANK TO HOST)" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-center font-mono mb-4 outline-none">
                <button id="entry-btn" onclick="joinOrCreateRoom()" class="w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl transition-all">CONNECTING...</button>
            </div>

            <div id="waiting-area" class="hidden bg-slate-800/40 p-6 rounded-3xl border border-slate-700 mb-6">
                <div id="room-code-display" class="text-4xl font-mono font-bold text-[#3b82f6] mb-4">----</div>
                <div id="lobby-player-list" class="flex flex-wrap justify-center gap-2 mb-4"></div>
                <button id="host-start-btn" onclick="hostStartGame()" class="hidden w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl">START GAME</button>
            </div>
        </section>

        <section id="screen-input" class="hidden-screen screen-fade w-full max-w-md">
            <div class="bg-slate-900 p-6 rounded-3xl mb-6 border border-[#3b82f6]/30">
                <p id="prompt-text" class="text-2xl font-bold">Wait...</p>
            </div>
            <textarea id="answer-input" oninput="validateInput()" placeholder="Exactly 5 words..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-5 text-white text-lg h-36 resize-none outline-none"></textarea>
            <button id="submit-btn" onclick="submitAnswer()" disabled class="w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl mt-4 opacity-50">SUBMIT</button>
        </section>

        <section id="screen-voting" class="hidden-screen screen-fade w-full max-w-md">
            <h2 class="text-xl font-bold mb-6 italic">Who is the <span class="text-[#f59e0b]">Imposter?</span></h2>
            <div id="voting-list" class="flex flex-col gap-3"></div>
        </section>

        <section id="screen-results" class="hidden-screen screen-fade w-full max-w-md text-center">
            <div id="revealed-name" class="text-5xl font-black text-[#f59e0b] uppercase mb-8 tracking-tighter">----</div>
            <button id="next-round-btn" onclick="handleNextRound()" class="w-full bg-white text-black font-bold py-4 rounded-2xl text-xl">Next Round</button>
        </section>
    </main>

    <script>
        // --- 1. CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA50JXsizLFn9MGGIByyw6PU4yHZ5ub3dw",
            authDomain: "vibeout-d814c.firebaseapp.com",
            databaseURL: "https://vibeout-d814c-default-rtdb.firebaseio.com/",
            projectId: "vibeout-d814c",
            storageBucket: "vibeout-d814c.firebasestorage.app",
            messagingSenderId: "784876378174",
            appId: "1:784876378174:web:dec7a58f1013cb593b596f"
        };

        // --- 2. FORCE CONNECTION ---
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        
        // This is the "secret sauce" - it forces Firebase to use standard HTTPS if WebSockets fail
        firebase.database().goOnline();

        db.ref(".info/connected").on("value", (snap) => {
            const banner = document.getElementById('debug-log');
            const btn = document.getElementById('entry-btn');
            if (snap.val() === true) {
                banner.innerText = "DATABASE STATUS: ONLINE";
                banner.className = "fixed top-0 left-0 w-full bg-blue-900 text-[10px] p-1 z-[100] font-mono text-center border-b border-blue-700 text-white";
                btn.innerText = "ENTER GAME";
                btn.disabled = false;
            } else {
                banner.innerText = "DATABASE STATUS: CONNECTING...";
                banner.className = "fixed top-0 left-0 w-full bg-amber-900 text-[10px] p-1 z-[100] font-mono text-center border-b border-amber-700 text-white";
                btn.innerText = "CONNECTING...";
                btn.disabled = true;
            }
        });

        // --- 3. GAME LOGIC ---
        const prompts = [{g:"Hospital",o:"Hotel"},{g:"Library",o:"Museum"},{g:"Pizza",o:"Taco"},{g:"Elephant",o:"Dino"},{g:"Coffee",o:"Energy Drink"}];
        let localPlayer = { id: 'p_' + Math.random().toString(36).substr(2, 9), name: "", isHost: false };
        let roomRef = null;

        function joinOrCreateRoom() {
            const name = document.getElementById('player-name').value.trim().toUpperCase();
            let code = document.getElementById('room-input').value.trim().toUpperCase();
            if (!name) return alert("Name required!");
            localPlayer.name = name;

            if (!code) {
                code = Math.random().toString(36).substring(2, 6).toUpperCase();
                localPlayer.isHost = true;
                db.ref('rooms/' + code).set({ gameState: "LOBBY", hostId: localPlayer.id }).then(() => setupPlayer(code));
            } else {
                db.ref('rooms/' + code).once('value', s => s.exists() ? setupPlayer(code) : alert("Room not found!"));
            }
        }

        function setupPlayer(code) {
            roomRef = db.ref('rooms/' + code);
            roomRef.child('players/' + localPlayer.id).set({ name: localPlayer.name, score: 0, isHost: localPlayer.isHost, answer: "", vote: "" });
            roomRef.child('players/' + localPlayer.id).onDisconnect().remove();
            
            document.getElementById('entry-form').classList.add('hidden');
            document.getElementById('waiting-area').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = code;
            
            roomRef.on('value', snap => { if(snap.val()) sync(snap.val()); });
        }

        function sync(data) {
            const players = Object.entries(data.players || {}).map(([id, p]) => ({...p, id}));
            document.getElementById('lobby-player-list').innerHTML = players.map(p => `<div class="bg-slate-700 text-white text-[10px] px-3 py-1 rounded-full uppercase">${p.name}</div>`).join('');
            if (localPlayer.isHost && players.length >= 3) document.getElementById('host-start-btn').classList.remove('hidden');

            const state = data.gameState || "LOBBY";
            if (state === "INPUT") {
                const isOdd = localPlayer.id === data.oddOneId;
                document.getElementById('prompt-text').innerText = `Describe ${isOdd ? data.currentPrompt.o : data.currentPrompt.g} in 5 words.`;
                showScreen('screen-input');
            }
            if (state === "VOTING") { renderVoting(data); showScreen('screen-voting'); }
            if (state === "RESULTS") {
                document.getElementById('revealed-name').innerText = data.players[data.oddOneId].name;
                showScreen('screen-results');
            }
            updateScoreboard(players);
        }

        function hostStartGame() {
            roomRef.child('players').once('value', snap => {
                const ids = Object.keys(snap.val());
                roomRef.update({
                    gameState: "INPUT",
                    currentPrompt: prompts[Math.floor(Math.random() * prompts.length)],
                    oddOneId: ids[Math.floor(Math.random() * ids.length)],
                    shuffled: ids.sort(() => Math.random() - 0.5)
                });
            });
        }

        function validateInput() {
            const count = document.getElementById('answer-input').value.trim().split(/\s+/).length;
            const btn = document.getElementById('submit-btn');
            btn.disabled = count !== 5;
            btn.style.opacity = count === 5 ? "1" : "0.5";
        }

        function submitAnswer() {
            roomRef.child('players/' + localPlayer.id).update({ answer: document.getElementById('answer-input').value.trim() });
            document.getElementById('submit-btn').classList.add('hidden');
            if (localPlayer.isHost) {
                roomRef.child('players').on('value', s => { if(Object.values(s.val()).every(p => p.answer)) roomRef.update({gameState: "VOTING"}); });
            }
        }

        function renderVoting(data) {
            const list = document.getElementById('voting-list');
            list.innerHTML = "";
            data.shuffled.forEach(id => {
                const p = data.players[id];
                const btn = document.createElement('button');
                btn.className = "w-full bg-slate-800 p-4 rounded-2xl text-left border border-slate-700";
                btn.innerHTML = `<span class="text-[9px] text-slate-500 uppercase">${p.name}</span><p class="text-white">"${p.answer}"</p>`;
                btn.onclick = () => {
                    roomRef.child('players/' + localPlayer.id).update({ vote: id });
                    list.innerHTML = "<p>Vote Cast...</p>";
                    if (localPlayer.isHost) checkVotes();
                };
                list.appendChild(btn);
            });
        }

        function checkVotes() {
            roomRef.child('players').once('value', s => { if(Object.values(s.val()).every(p => p.vote)) roomRef.update({gameState: "RESULTS"}); });
        }

        function updateScoreboard(players) {
            document.getElementById('scoreboard-list').innerHTML = players.map(p => `
                <div class="px-4 border-r border-slate-800 text-center">
                    <div class="text-[8px] text-slate-500 uppercase">${p.name}</div>
                    <div class="text-xl font-black">${p.score || 0}</div>
                </div>
            `).join('');
        }

        function showScreen(id) {
            ['screen-lobby','screen-input','screen-voting','screen-results'].forEach(s => document.getElementById(s).classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
            document.getElementById('game-header').classList.toggle('hidden', id === 'screen-lobby');
        }

        lucide.createIcons();
    </script>
</body>
</html>
