<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeOut | Social Deduction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .hidden-screen { display: none; }
        .screen-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="debug-log" class="fixed top-0 left-0 w-full bg-slate-800 text-[10px] p-1 z-[100] font-mono text-center border-b border-slate-700 text-slate-400">
        Status: Initializing...
    </div>

    <header id="game-header" class="hidden p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center mt-6">
        <div id="scoreboard-list" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">VibeOut</div>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-center">

        <section id="screen-lobby" class="screen-fade w-full max-w-md text-center">
            <h1 class="text-6xl font-bold mb-2 tracking-tighter italic"><span class="text-[#3b82f6]">Vibe</span>Out</h1>
            <p class="text-slate-400 mb-8 text-xs uppercase tracking-widest italic">Exactly 5 words. One imposter.</p>
            
            <div id="entry-form" class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700 mb-6 shadow-2xl">
                <input id="player-name" type="text" placeholder="YOUR NAME" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-center font-bold mb-3 outline-none focus:ring-2 focus:ring-[#3b82f6]">
                <input id="room-input" type="text" placeholder="ROOM CODE (BLANK TO HOST)" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-center font-mono mb-4 outline-none focus:ring-2 focus:ring-[#3b82f6]">
                <button id="entry-btn" onclick="joinOrCreateRoom()" class="w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl hover:bg-blue-500 active:scale-95 transition-all">ENTER GAME</button>
            </div>

            <div id="waiting-area" class="hidden screen-fade bg-slate-800/40 p-6 rounded-3xl border border-slate-700 mb-6">
                <div id="room-code-display" class="text-4xl font-mono font-bold tracking-widest text-[#3b82f6] mb-4">----</div>
                <div id="lobby-player-list" class="flex flex-wrap justify-center gap-2 mb-4"></div>
                <button id="host-start-btn" onclick="hostStartGame()" class="hidden w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl">START GAME</button>
                <p id="min-players-note" class="text-[10px] text-amber-500 font-bold uppercase mt-2">Waiting for 3 players...</p>
            </div>
        </section>

        <section id="screen-input" class="hidden-screen screen-fade w-full max-w-md">
            <div class="border-2 border-[#3b82f6]/30 bg-slate-900 p-6 rounded-3xl mb-6 shadow-xl text-center">
                <p id="prompt-text" class="text-2xl font-bold leading-tight">Describe the word in exactly 5 words.</p>
            </div>
            <textarea id="answer-input" oninput="validateInput()" placeholder="Exactly 5 words..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-5 text-white text-lg h-36 resize-none outline-none"></textarea>
            <button id="submit-btn" onclick="submitAnswer()" disabled class="w-full bg-[#3b82f6] text-white font-bold py-4 rounded-2xl text-xl mt-4 opacity-50 transition-all">SUBMIT</button>
        </section>

        <section id="screen-voting" class="hidden-screen screen-fade w-full max-w-md">
            <h2 class="text-center text-xl font-bold mb-6 italic">Who is the <span class="text-[#f59e0b]">Odd One Out?</span></h2>
            <div id="voting-list" class="flex flex-col gap-3"></div>
        </section>

        <section id="screen-results" class="hidden-screen screen-fade w-full max-w-md text-center">
            <div id="revealed-name" class="text-5xl font-black text-[#f59e0b] uppercase mb-8">----</div>
            <button id="next-round-btn" onclick="handleNextRound()" class="w-full bg-white text-black font-bold py-4 rounded-2xl text-xl uppercase tracking-widest">Next Round</button>
        </section>

    </main>

    <script>
     // --- 1. FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyA50JXsizLFn9MGGIByyw6PU4yHZ5ub3dw",
    authDomain: "vibeout-d814c.firebaseapp.com",
    databaseURL: "https://vibeout-d814c-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "vibeout-d814c",
    storageBucket: "vibeout-d814c.firebasestorage.app",
    messagingSenderId: "784876378174",
    appId: "1:784876378174:web:dec7a58f1013cb593b596f"
};

// Persistent ID so refresh doesn't kill your Host status
if(!localStorage.getItem('vibe_uid')) {
    localStorage.setItem('vibe_uid', 'p_' + Math.random().toString(36).substr(2, 9));
}
let localPlayer = { 
    id: localStorage.getItem('vibe_uid'), 
    name: "", 
    isHost: false 
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
let roomRef = null;

// --- 2. ENTRY LOGIC ---

function joinOrCreateRoom() {
    const name = document.getElementById('player-name').value.trim().toUpperCase();
    let code = document.getElementById('room-input').value.trim().toUpperCase();
    if (!name) return alert("Name required!");
    
    localPlayer.name = name;
    document.getElementById('entry-btn').innerText = "CONNECTING...";

    if (!code) {
        // HOSTING
        const newCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        localPlayer.isHost = true;
        db.ref('rooms/' + newCode).set({
            gameState: "LOBBY",
            hostId: localPlayer.id,
            createdAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => setupGame(newCode));
    } else {
        // JOINING
        db.ref('rooms/' + code).once('value', snap => {
            if (snap.exists()) {
                localPlayer.isHost = (snap.val().hostId === localPlayer.id);
                setupGame(code);
            } else {
                alert("Room not found!");
                document.getElementById('entry-btn').innerText = "ENTER GAME";
            }
        });
    }
}

function setupGame(code) {
    roomRef = db.ref('rooms/' + code);
    roomRef.child('players/' + localPlayer.id).update({
        id: localPlayer.id,
        name: localPlayer.name,
        score: 0,
        isHost: localPlayer.isHost
    });

    roomRef.child('players/' + localPlayer.id).onDisconnect().remove();
    
    document.getElementById('entry-form').classList.add('hidden');
    document.getElementById('waiting-area').classList.remove('hidden');
    document.getElementById('room-code-display').innerText = code;

    roomRef.on('value', snap => {
        const data = snap.val();
        if (data) renderUI(data);
    });
}

function renderUI(data) {
    const players = data.players ? Object.values(data.players) : [];
    const count = players.length;
    
    // Update Lobby List
    document.getElementById('current-count').innerText = count;
    document.getElementById('lobby-player-list').innerHTML = players.map(p => `
        <div class="${p.id === localPlayer.id ? 'bg-[#3b82f6]' : 'bg-slate-700'} text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">
            ${p.name} ${p.id === data.hostId ? '👑' : ''}
        </div>
    `).join('');

    // --- THE FIX: Host Detection ---
    const startBtn = document.getElementById('host-start-btn');
    const note = document.getElementById('min-players-note');
    
    // You are host if your ID matches the hostId in the database
    const isMeHost = (data.hostId === localPlayer.id);

    if (isMeHost) {
        startBtn.classList.remove('hidden');
        // Disable start if under 3 players, but show the button so you know you're host
        if (count >= 3) {
            startBtn.disabled = false;
            startBtn.innerText = "START GAME";
            startBtn.style.opacity = "1";
            note.classList.add('hidden');
        } else {
            startBtn.disabled = true;
            startBtn.innerText = "WAITING FOR 3...";
            startBtn.style.opacity = "0.5";
            note.classList.remove('hidden');
        }
    }

    // State Manager
    const state = data.gameState || "LOBBY";
    if (state === "LOBBY") showScreen('screen-lobby');
    if (state === "INPUT") {
        const isOdd = localPlayer.id === data.oddOneId;
        document.getElementById('prompt-text').innerText = `Describe ${isOdd ? data.currentPrompt.o : data.currentPrompt.g} in 5 words.`;
        showScreen('screen-input');
    }
    if (state === "VOTING") { renderVoting(data); showScreen('screen-voting'); }
    if (state === "RESULTS") {
        document.getElementById('revealed-name').innerText = data.players[data.oddOneId].name;
        showScreen('screen-results');
    }
    updateScoreboard(players);
}

// --- 3. GAME ACTIONS ---

function hostStartGame() {
    roomRef.child('players').once('value', snap => {
        const pObj = snap.val();
        const ids = Object.keys(pObj);
        const pair = [{g:"Coffee",o:"Tea"},{g:"Pizza",o:"Taco"},{g:"Dog",o:"Wolf"}][Math.floor(Math.random() * 3)];
        
        roomRef.update({
            gameState: "INPUT",
            currentPrompt: pair,
            oddOneId: ids[Math.floor(Math.random() * ids.length)],
            shuffled: ids.sort(() => Math.random() - 0.5)
        });
    });
}

function validateInput() {
    const words = document.getElementById('answer-input').value.trim().split(/\s+/);
    const btn = document.getElementById('submit-btn');
    const isValid = words.length === 5 && words[0] !== "";
    btn.disabled = !isValid;
    btn.style.opacity = isValid ? "1" : "0.5";
    document.getElementById('word-count-label').innerText = `Words: ${words[0] === "" ? 0 : words.length} / 5`;
}

function submitAnswer() {
    roomRef.child('players/' + localPlayer.id).update({ answer: document.getElementById('answer-input').value.trim() });
    document.getElementById('submit-btn').classList.add('hidden');
    
    if (localPlayer.isHost) {
        roomRef.child('players').on('value', snap => {
            if (Object.values(snap.val()).every(p => p.answer)) {
                roomRef.child('players').off('value');
                roomRef.update({ gameState: "VOTING" });
            }
        });
    }
}

function renderVoting(data) {
    const list = document.getElementById('voting-list');
    list.innerHTML = "";
    data.shuffled.forEach(id => {
        const p = data.players[id];
        const btn = document.createElement('button');
        btn.className = "w-full bg-slate-800 p-4 rounded-2xl text-left border border-slate-700 mb-2";
        btn.innerHTML = `<span class="text-[9px] text-slate-500 uppercase">${p.name}</span><p class="text-white italic">"${p.answer}"</p>`;
        btn.onclick = () => {
            roomRef.child('players/' + localPlayer.id).update({ vote: id });
            list.innerHTML = "<p class='text-center mt-10'>Vote cast...</p>";
        };
        list.appendChild(btn);
    });
}

function updateScoreboard(players) {
    document.getElementById('scoreboard-list').innerHTML = players.map(p => `
        <div class="px-4 border-r border-slate-800 text-center min-w-[70px]">
            <div class="text-[8px] text-slate-500 uppercase">${p.name}</div>
            <div class="text-xl font-black">${p.score || 0}</div>
        </div>
    `).join('');
}

function showScreen(id) {
    ['screen-lobby','screen-input','screen-voting','screen-results'].forEach(s => document.getElementById(s).classList.add('hidden-screen'));
    document.getElementById(id).classList.remove('hidden-screen');
    document.getElementById('game-header').classList.toggle('hidden', id === 'screen-lobby');
}

lucide.createIcons();
    </script>
</body>
</html>
